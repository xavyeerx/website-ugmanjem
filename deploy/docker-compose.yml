services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: anjem-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      - VECTORSTORE_PATH=/data/vectorstore/chroma_db
      - COLLECTION_NAME=ugm_anjem_knowledge
      - CORS_ORIGINS=["http://localhost:3000","http://10.33.109.173","http://10.33.109.173:80"]
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    volumes:
      - ../vectorstore:/data/vectorstore
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_SUPABASE_URL: "https://baqkpgjkobuqzfrqqccb.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhcWtwZ2prb2J1cXpmcnFxY2NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODIxNDgsImV4cCI6MjA4ODU1ODE0OH0.-cnsg1c2ZARudPjErs5vR6SCRPXqeeOZ0tFpbq-VhOw"
        USE_SUPABASE: "true"
    container_name: anjem-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: anjem-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
