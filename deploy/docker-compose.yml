services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: anjem-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      - VECTORSTORE_PATH=/data/vectorstore/chroma_db
      - COLLECTION_NAME=ugm_anjem_knowledge
      - CORS_ORIGINS=["http://localhost:3000","http://10.33.109.173","http://10.33.109.173:80"]
    volumes:
      - ../vectorstore:/data/vectorstore
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_SUPABASE_URL: "https://baqkpgjkobuqzfrqqccb.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhcWtwZ2prb2J1cXpmcnFxY2NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODIxNDgsImV4cCI6MjA4ODU1ODE0OH0.-cnsg1c2ZARudPjErs5vR6SCRPXqeeOZ0tFpbq-VhOw"
        USE_SUPABASE: "true"
    container_name: anjem-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=https://baqkpgjkobuqzfrqqccb.supabase.co
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhcWtwZ2prb2J1cXpmcnFxY2NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODIxNDgsImV4cCI6MjA4ODU1ODE0OH0.-cnsg1c2ZARudPjErs5vR6SCRPXqeeOZ0tFpbq-VhOw
      - USE_SUPABASE=true
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: anjem-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: anjem-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: anjem-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=anjemugm123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: anjem-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    command:
      - "--docker_only=true"
      - "--housekeeping_interval=15s"
    ports:
      - "8080:8080"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: anjem-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"

volumes:
  prometheus_data:
  grafana_data:
